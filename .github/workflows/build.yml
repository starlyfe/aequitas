name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: tools/build-windows.ps1
            shell: pwsh
            platform: windows
          - os: ubuntu-latest
            script: tools/build-linux.sh
            shell: bash
            platform: linux
          - os: macos-latest
            script: tools/build-macos.sh
            shell: bash
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: ver
        shell: bash
        run: |
          V="$(tr -d '[:space:]' < VERSION)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Aequitas VERSION=$V"

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers,Vulkan-Loader,Glslang,SPIRV-Tools
          vulkan-use-cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build zip \
            libx11-dev libxrandr-dev libxi-dev libxxf86vm-dev \
            libxinerama-dev libxcursor-dev xorg-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Install macOS Ninja
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Build, test, and package (Release)
        shell: ${{ matrix.shell }}
        run: ${{ matrix.script }}

      - name: Upload versioned release zip
        uses: actions/upload-artifact@v4
        with:
          name: aequitas-v${{ steps.ver.outputs.version }}-${{ matrix.platform }}
          path: |
            releases/v${{ steps.ver.outputs.version }}/aequitas-v${{ steps.ver.outputs.version }}-${{ matrix.platform }}.zip
            releases/v${{ steps.ver.outputs.version }}/aequitas-v${{ steps.ver.outputs.version }}-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: CHANGELOG.md
